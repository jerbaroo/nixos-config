<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitHub Dashboard</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/25/25231.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- Catppuccin Mocha Palette --- */
        :root {
            --ctp-base: #1e1e2e;
            --ctp-mantle: #181825;
            --ctp-crust: #11111b;
            --ctp-text: #cdd6f4;
            --ctp-subtext0: #a6adc8;
            --ctp-subtext1: #bac2de;
            --ctp-surface0: #313244;
            --ctp-surface1: #45475a;
            --ctp-blue: #89b4fa;
            --ctp-lavender: #b4befe;
            --ctp-green: #a6e3a1;
            --ctp-red: #f38ba8;
            --ctp-maroon: #eba0ac;
            --ctp-peach: #fab387;
            --ctp-yellow: #f9e2af;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            padding-top: 0;
            background-color: var(--ctp-base); 
            color: var(--ctp-text); 
        }

        /* Section Headers */
        h4 { 
            margin-top: 25px; 
            margin-bottom: 10px; 
            color: var(--ctp-subtext1); 
            text-transform: uppercase; 
            font-size: 0.85em; 
            letter-spacing: 1px; 
            font-weight: 600;
            border-bottom: 1px solid var(--ctp-surface0); 
            padding-bottom: 5px;
        }

        /* Subtitle is now primarily for errors */
        #subtitle { color: var(--ctp-subtext0); font-style: italic; margin-bottom: 20px; min-height: 0; }
        
        ul { list-style-type: none; padding: 0; }
        a { text-decoration: none; color: inherit; }

        /* CARD STYLING */
        .card { 
            margin-bottom: 8px; 
            padding: 10px 14px; 
            background: var(--ctp-mantle); 
            border: 1px solid var(--ctp-surface0); 
            border-radius: 6px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: transform 0.1s ease, background 0.2s ease;
        }
        .card:hover { 
            background-color: var(--ctp-surface0); 
            border-color: var(--ctp-surface1);
            transform: translateY(-1px);
        }

        /* LEFT SIDE INFO */
        .info { display: flex; flex-direction: column; flex: 1; margin-right: 15px; min-width: 0; }

        /* Typography */
        .card-title { font-size: 1em; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-title-repo { color: var(--ctp-blue); font-weight: 600; margin-right: 5px; opacity: 0.9; }
        .card-title-number { color: var(--ctp-subtext0); font-weight: normal; margin-right: 5px; font-size: 0.9em; }
        .card-title-title { color: var(--ctp-text); font-weight: 600; }

        /* META ROW */
        .meta { 
            font-size: 0.8em; 
            color: var(--ctp-subtext0); 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            gap: 12px; 
        }
        
        .author { color: var(--ctp-subtext1); font-weight: 500; }

        /* RIGHT SIDE STATUS */
        .status-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        /* BADGES */
        .status-badge i { font-size: 1.1em; }
        .status-text { 
            font-size: 0.7em; 
            padding: 3px 8px; 
            border-radius: 12px; 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-PENDING { background: var(--ctp-yellow); color: var(--ctp-crust); }
        .status-LGTM { background: var(--ctp-green); color: var(--ctp-crust); }

        /* UTILITIES */
        .error { color: var(--ctp-red); background: rgba(243, 139, 168, 0.1); padding: 10px; border: 1px solid var(--ctp-red); border-radius: 4px; }
        
        .color-green { color: var(--ctp-green) !important; }
        .color-red { color: var(--ctp-red) !important; }
        
        /* Label Styles */
        .gh-label {
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div id="subtitle"></div>
    <div id="app"></div>

    <script>
        // --- CONFIG ---
        const CTP = {
            green: '#a6e3a1',
            red: '#f38ba8',
            peach: '#fab387',
            maroon: '#eba0ac',
            subtext: '#a6adc8',
            base: '#1e1e2e'
        };

        async function fetchData() {
            try {
                const response = await fetch(`/data${window.location.search}`)
                const json = await response.json()
                
                if (json.error) {
                    showError("Server Error: " + json.error)
                    return
                }
                
                if (json.github && json.github.data) {
                    render_github_data(json.github.data)
                } else {
                    showError("Invalid data format received.")
                }
            } catch (err) {
                console.error(err)
                showError("Failed to fetch data from server.")
            }
        }

        function render_github_data(data) {
            const app = document.getElementById('app')
            
            // Section order
            const sections = ['reviewRequested', 'prAssigned', 'prAuthored', 'issueAssigned']
            const sectionHeaders = ['Review Requested', 'PRs Assigned', 'PRs Authored', 'Issues Assigned']

            sections.forEach((key, i) => {
                if (data[key]) {
                    app.innerHTML += createSectionHtml(key, sectionHeaders[i], data[key])
                }
            })
        }

        function createSectionHtml(key, sectionHeader, sectionData) {
            const count = sectionData.issueCount || 0
            const nodes = sectionData.nodes || []

            if (nodes.length === 0) {
                return `<h4>${sectionHeader} (0)</h4><div style="color:var(--ctp-surface1); font-style:italic; padding:10px 0;">Nothing here.</div>`
            }

            const listItems = nodes.map(node => {
                // 1. Status Icon Logic
                const status = node.statusCheckRollup
                const statusIcon = status ? (state => {
                    if(state === "SUCCESS") return { icon: 'fa-solid fa-circle-check', color: 'color-green' };
                    return { icon: 'fa-solid fa-circle-xmark', color: 'color-red' };
                })(status.state) : null
                
                const statusBadge = status
                    ? `<i class="${statusIcon.icon} ${statusIcon.color}" title="${status.state}"></i>` 
                    : '';

                // 2. LGTM / Pending Logic
                const lgtm = node.reviewDecision !== undefined ? (decision => {
                    const text = decision && decision === "APPROVAL" ? "LGTM" : "PENDING"
                    return `<div class="status-text status-${text}">${text}</div>`
                })(node.reviewDecision) : ''

                // 3. Size Changes
                const additions = node.additions !== undefined
                  ? `<span class="additions color-green">+${node.additions}</span>` : ''
                const deletions = node.deletions !== undefined
                  ? `<span class="deletions color-red">-${node.deletions}</span>` : ''

                // 4. Age Logic
                const ageInfo = ageStyle(node.createdAt);
                const ageBadge = `
                    <span style="${ageInfo.style}" title="Created: ${ageInfo.fullDate}">
                        <i class="fa-solid ${ageInfo.icon}"></i> ${ageInfo.text}
                    </span>`;

                // 5. Labels
                const labels = node.labels && node.labels.nodes ? node.labels.nodes : [];
                const labelsHtml = labels.map(label => {
                    const textColor = getContrastColor(label.color) === 'black' ? '#11111b' : '#cdd6f4';
                    return `<span class="gh-label" style="background-color: #${label.color}; color: ${textColor};">${label.name}</span>`
                }).join('')
                
                const repoName = node.repository ? node.repository.name : node.url.split('/')[4];

                return `
                    <li>
                        <a href="${node.url}" target="_blank" class="card">
                            <div class="info">
                                <div class="card-title">
                                    <span class="card-title-repo">${repoName}</span>
                                    <span class="card-title-number">#${node.number}</span>
                                    <span class="card-title-title">${node.title}</span> 
                                </div>
                                <div class="meta">
                                    <span class="author">@${node.author.login}</span>
                                    ${additions}
                                    ${deletions}
                                    ${ageBadge}
                                    ${labelsHtml}
                                </div>
                            </div>
                            
                            <div class="status-wrapper">
                                ${lgtm}
                                <div class="status-badge">${statusBadge}</div>
                            </div>
                        </a>
                    </li>
                `
            }).join('')

            return `
                <h4>${sectionHeader} (${count})</h4>
                <ul>${listItems}</ul>
            `
        }

        function showSubtitle(msg, className) {
            const el = document.getElementById('subtitle')
            el.innerText = msg
            el.className = className
        }
        function showError(msg) {
            showSubtitle(msg, "error")
        }

        function ageStyle(isoDateString) {
            const now = new Date()
            const date = new Date(isoDateString)
            const diffTime = Math.abs(now - date)
            const days = Math.floor(diffTime / (1000 * 60 * 60 * 24))

            let style = `color: ${CTP.subtext};` 
            let icon = "fa-clock"

            if (days >= 3 && days < 7) {
                style = `color: ${CTP.peach}; font-weight: 600;` 
            } else if (days >= 7 && days < 14) {
                style = `color: ${CTP.red}; font-weight: 700;`
                icon = "fa-fire"
            } else if (days >= 14) {
                style = `color: ${CTP.maroon}; font-weight: 800;`
                icon = "fa-skull"
            }

            return { text: `${days}d`, style: style, icon: icon, fullDate: date.toLocaleDateString() }
        }

        function getContrastColor(hexColor) {
            const r = parseInt(hexColor.substr(0, 2), 16);
            const g = parseInt(hexColor.substr(2, 2), 16);
            const b = parseInt(hexColor.substr(4, 2), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        fetchData()
    </script>
</body>
</html>
